   <h1 style="background-color:#9969B5;color:#E3C9F0;text-align: center">Pancakes</h1>

  <h2 style="color:#1F7070">Ingredientes</h2>

<ul style="color:#5ED1D1">
<li>Harina</li>
<li>Azúcar</li>
<li>Huevo</li>
<li>Leche</li>
<li>Esencia de vainilla</li>
</ul>

  <h2 style="color:#197345">Preparación</h2>

<ol style="color:#55B58A">
<li>Colocar en el bol 1 taza de harina</li>
<li>Colocar 1/2 taza de azúcar</li>
<li>Colocar 1 huevo</li>
<li>Colocar 60ml de leche</li>
<li>Esencia de vainilla a gusto</li>
</ol>
